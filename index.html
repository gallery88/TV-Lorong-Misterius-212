<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>TV LORONG MISTERIUS 212 v3</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,
body{
width:100%;
height:100%;
background:#000;
color:#fff;
overflow:hidden;
}

/*==========================
MENU
==========================*/

#menu{
width:100%;
height:100%;
overflow:auto;
padding:20px;
background:#000;
}

#title{
text-align:center;
color:#FFD700;
font-size:30px;
font-weight:bold;
}

#subtitle{
text-align:center;
margin-top:8px;
margin-bottom:25px;
font-size:22px;
}

#channelList{
width:100%;
max-width:520px;
margin:auto;
display:flex;
flex-direction:column;
gap:18px;
}

.channel{
background:#181818;
border:2px solid #FFD700;
border-radius:16px;
padding:18px;
cursor:pointer;
transition:.25s;
}

.channel:hover{

transform:scale(1.02);

}

.channelTitle{

font-size:22px;

font-weight:bold;

color:#FFD700;

margin-bottom:10px;

}

.channelDate{

font-size:17px;

margin-bottom:8px;

}

.channelMatch{

font-size:21px;

}


/*==========================
PLAYER
==========================*/

#playerPage{

display:none;

position:fixed;

inset:0;

background:#000;

}

#backBtn{

position:fixed;

left:12px;

top:12px;

z-index:99999;

padding:10px 18px;

font-size:16px;

font-weight:bold;

background:#FFD700;

border:none;

border-radius:10px;

cursor:pointer;

color:#000;

}


/*==========================
COUNTDOWN
==========================*/

#countdown{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

background:#000;

text-align:center;

padding:20px;

}

#status{

font-size:30px;

margin-bottom:15px;

}

#timer{

font-size:64px;

font-weight:bold;

color:#00ff66;

margin-bottom:20px;

}

#match{

font-size:24px;

margin-bottom:12px;

}

#kickoff{

font-size:18px;

opacity:.9;

}


/*==========================
PLAYER
==========================*/

#iframePlayer{

display:none;

position:absolute;

inset:0;

width:100%;

height:100%;

border:none;

background:#000;

}

#videoPlayer{

display:none;

position:absolute;

inset:0;

width:100%;

height:100%;

background:#000;

}


/*==========================
LOADING
==========================*/

#loading{

display:none;

position:absolute;

inset:0;

z-index:9000;

background:rgba(0,0,0,.75);

justify-content:center;

align-items:center;

font-size:26px;

font-weight:bold;

}


/*==========================
ERROR
==========================*/

#error{

display:none;

position:absolute;

inset:0;

z-index:9001;

background:#000;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

font-size:24px;

color:#ff5555;

}


/*==========================
RESPONSIVE
==========================*/

@media(max-width:700px){

#title{

font-size:24px;

}

#subtitle{

font-size:18px;

}

.channelTitle{

font-size:19px;

}

.channelDate{

font-size:15px;

}

.channelMatch{

font-size:18px;

}

#status{

font-size:22px;

}

#timer{

font-size:46px;

}

#match{

font-size:20px;

}

}

</style>

</head>

<body>

<!-- ======================================================
MENU
====================================================== -->

<div id="menu">

    <div id="title">
        📺 TV LORONG MISTERIUS 212
    </div>

    <div id="subtitle">
        🏆 FIFA WORLD CUP 2026
    </div>

    <div id="channelList"></div>

</div>

<!-- ======================================================
PLAYER PAGE
====================================================== -->

<div id="playerPage">

    <button id="backBtn">
        ⬅ Kembali
    </button>

    <div id="countdown">

        <h1>
            📺 TV LORONG MISTERIUS 212
        </h1>

        <br>

        <h2>
            🏆 FIFA WORLD CUP 2026
        </h2>

        <br><br>

        <div id="status">

            ⏳ Siaran akan dimulai dalam

        </div>

        <div id="timer">

            00:00:00

        </div>

        <div id="match"></div>

        <br>

        <div id="kickoff"></div>

    </div>

    <div id="loading">

        Loading Stream...

    </div>

    <div id="error">

        ❌ Stream tidak dapat dibuka

    </div>

    <iframe
        id="iframePlayer"
        allowfullscreen
        allow="autoplay; fullscreen">
    </iframe>

    <video
        id="videoPlayer"
        playsinline
        controls
        autoplay>
    </video>

</div>

<script>

/* ======================================================
GLOBAL
====================================================== */

let timerInterval=null;

let currentChannel=null;

let hls=null;

let dashPlayer=null;


/* ======================================================
CHANNELS
====================================================== */

const CHANNELS=[

{

title:"SPORTS 1",

match:"Australia|Egypt",

kickoff:"2026-07-04T03:00:00+09:00",

duration:200,

stream:"https://037.fifaonlineworldcup.com/albaplayer/sports-1"

},
    
{

title:"SPORTS 2",

match:"Australia|Egypt",

kickoff:"2026-07-04T03:00:00+09:00",

duration:200,

stream:"https://edge22.776740.ir.cdn.ir/hls2/rasf1.m3u8"

},

{

title:"SPORTS 1",

match:"Argentina|Cabo Verde",

kickoff:"2026-07-04T07:00:00+09:00",

duration:200,

stream:"https://037.fifaonlineworldcup.com/albaplayer/sports-2"

},

{

title:"SPORTS 2",

match:"Argentina|Cabo Verde",

kickoff:"2026-07-04T07:00:00+09:00",

duration:200,

stream:"https://edge22.776740.ir.cdn.ir/hls2/rasf1.m3u8"

},

{

title:"SPORTS 1",

match:"Colombia|Ghana",

kickoff:"2026-07-04T10:30:00+09:00",

duration:200,

stream:"https://037.fifaonlineworldcup.com/albaplayer/sports-1"

},

{

title:"SPORTS 2",

match:"Colombia|Ghana",

kickoff:"2026-07-04T10:30:00+09:00",

duration:200,

stream:"https://edge22.776740.ir.cdn.ir/hls2/rasf1.m3u8"

}

];


/* ======================================================
FLAGS
====================================================== */

const FLAGS={

Spain:"🇪🇸",

Austria:"🇦🇹",

Brazil:"🇧🇷",

Argentina:"🇦🇷",

France:"🇫🇷",

Germany:"🇩🇪",

Portugal:"🇵🇹",

Italy:"🇮🇹",

Netherlands:"🇳🇱",

Belgium:"🇧🇪",

Croatia:"🇭🇷",

Japan:"🇯🇵",

Korea:"🇰🇷",

Australia:"🇦🇺",

USA:"🇺🇸",

Mexico:"🇲🇽",

Canada:"🇨🇦",

Morocco:"🇲🇦",

Uruguay:"🇺🇾",

Switzerland:"🇨🇭",

Algeria:"🇩🇿",

Egypt:"🇪🇬",

"Saudi Arabia":"🇸🇦",

Qatar:"🇶🇦",

Iran:"🇮🇷",

Iraq:"🇮🇶",

Jordan:"🇯🇴",

Indonesia:"🇮🇩",

Vietnam:"🇻🇳",

Thailand:"🇹🇭",

Malaysia:"🇲🇾",

Singapore:"🇸🇬",

Philippines:"🇵🇭",

China:"🇨🇳",

India:"🇮🇳",

Colombia:"🇨🇴",

Chile:"🇨🇱",

Paraguay:"🇵🇾",

Peru:"🇵🇪",

Ghana:"🇬🇭",

Nigeria:"🇳🇬",

Cameroon:"🇨🇲",

Senegal:"🇸🇳",

Tunisia:"🇹🇳"

};

/* ======================================================
HARI & BULAN
====================================================== */

const HARI=[
"Minggu",
"Senin",
"Selasa",
"Rabu",
"Kamis",
"Jumat",
"Sabtu"
];

const BULAN=[
"Januari",
"Februari",
"Maret",
"April",
"Mei",
"Juni",
"Juli",
"Agustus",
"September",
"Oktober",
"November",
"Desember"
];


/* ======================================================
ELEMENT UI
====================================================== */

const ui={

menu:document.getElementById("menu"),

channelList:document.getElementById("channelList"),

playerPage:document.getElementById("playerPage"),

countdown:document.getElementById("countdown"),

status:document.getElementById("status"),

timer:document.getElementById("timer"),

match:document.getElementById("match"),

kickoff:document.getElementById("kickoff"),

loading:document.getElementById("loading"),

error:document.getElementById("error"),

iframe:document.getElementById("iframePlayer"),

video:document.getElementById("videoPlayer"),

back:document.getElementById("backBtn")

};


/* ======================================================
FLAG
====================================================== */

function flag(nama){

    return (FLAGS[nama] || "🏳")+" "+nama;

}


/* ======================================================
PARSE MATCH
====================================================== */

function parseMatch(match){

    const data=match.split("|");

    return{

        home:data[0].trim(),

        away:data[1].trim()

    };

}


/* ======================================================
FORMAT JAM
====================================================== */

function formatJam(date){

    return String(date.getHours()).padStart(2,"0")

    +":"

    +String(date.getMinutes()).padStart(2,"0");

}


/* ======================================================
ZONA WAKTU
====================================================== */

function getZona(){

    const offset=-new Date().getTimezoneOffset();

    if(offset===420) return "WIB";

    if(offset===480) return "WITA";

    if(offset===540) return "WIT";

    return "Local";

}


/* ======================================================
TODAY / TOMORROW
====================================================== */

function formatTanggal(date){

    const now=new Date();

    const today=new Date(

        now.getFullYear(),

        now.getMonth(),

        now.getDate()

    );

    const target=new Date(

        date.getFullYear(),

        date.getMonth(),

        date.getDate()

    );

    const selisih=Math.round(

        (target-today)/86400000

    );

    if(selisih===0)

        return "📅 Today";

    if(selisih===1)

        return "📅 Tomorrow";

    return "📅 "

    +HARI[date.getDay()]

    +", "

    +String(date.getDate()).padStart(2,"0")

    +" "

    +BULAN[date.getMonth()]

    +" "

    +date.getFullYear();

}


/* ======================================================
DETECT STREAM
====================================================== */

function detectType(url){

    const u=url.toLowerCase();

    if(u.endsWith(".m3u8"))

        return "hls";

    if(u.endsWith(".mpd"))

        return "dash";

    if(u.endsWith(".mp4"))

        return "mp4";

    return "iframe";

}


/* ======================================================
LOADING
====================================================== */

function showLoading(){

    ui.loading.style.display="flex";

}

function hideLoading(){

    ui.loading.style.display="none";

}


/* ======================================================
ERROR
====================================================== */

function showError(msg="❌ Stream tidak dapat dibuka"){

    ui.error.innerHTML=msg;

    ui.error.style.display="flex";

}

function hideError(){

    ui.error.style.display="none";

}

/* ======================================================
MENU ENGINE
====================================================== */

function createChannelCard(ch,index){

    const match=parseMatch(ch.match);

    const start=new Date(ch.kickoff);

    const card=document.createElement("div");

    card.className="channel";

    card.onclick=function(){

        openChannel(index);

    };

    card.innerHTML=

    `
        <div class="channelTitle">

            📺 ${ch.title}

        </div>

        <div class="channelDate">

            ${formatTanggal(start)}

            •

            ${formatJam(start)}

            ${getZona()}

        </div>

        <div class="channelMatch">

            ${flag(match.home)}

            🆚

            ${flag(match.away)}

        </div>

    `;

    return card;

}


/* ======================================================
RENDER MENU
====================================================== */

function renderMenu(){

    ui.channelList.innerHTML="";

    CHANNELS.forEach(function(ch,index){

        ui.channelList.appendChild(

            createChannelCard(ch,index)

        );

    });

}


/* ======================================================
REFRESH MENU
====================================================== */

function refreshMenu(){

    renderMenu();

}


/* ======================================================
AUTO REFRESH
====================================================== */

setInterval(function(){

    refreshMenu();

},60000);

/* ======================================================
PLAYER ENGINE
====================================================== */

function destroyPlayer(){

    if(timerInterval===null){
        // timer countdown tetap dikelola di bagian countdown
    }

    if(hls){

        hls.destroy();

        hls=null;

    }

    if(dashPlayer){

        dashPlayer.reset();

        dashPlayer=null;

    }

    ui.iframe.src="";

    ui.video.pause();

    ui.video.removeAttribute("src");

    ui.video.load();

    ui.iframe.style.display="none";

    ui.video.style.display="none";

    hideLoading();

    hideError();

}


/* ======================================================
PLAY IFRAME
====================================================== */

function playIframe(url){

    destroyPlayer();

    showLoading();

    ui.iframe.style.display="block";

    ui.iframe.onload=function(){

        hideLoading();

    };

    ui.iframe.src=url;

}


/* ======================================================
PLAY MP4
====================================================== */

function playMP4(url){

    destroyPlayer();

    showLoading();

    ui.video.style.display="block";

    ui.video.src=url;

    ui.video.onloadeddata=function(){

        hideLoading();

        ui.video.play().catch(()=>{});

    };

    ui.video.onerror=function(){

        hideLoading();

        showError();

    };

}


/* ======================================================
PLAY HLS
====================================================== */

function playHLS(url){

    destroyPlayer();

    showLoading();

    ui.video.style.display="block";

    if(ui.video.canPlayType("application/vnd.apple.mpegurl")){

        ui.video.src=url;

        ui.video.onloadeddata=function(){

            hideLoading();

            ui.video.play().catch(()=>{});

        };

    }
    else{

        hls=new Hls();

        hls.loadSource(url);

        hls.attachMedia(ui.video);

        hls.on(Hls.Events.MANIFEST_PARSED,function(){

            hideLoading();

            ui.video.play().catch(()=>{});

        });

        hls.on(Hls.Events.ERROR,function(){

            hideLoading();

            showError();

        });

    }

}


/* ======================================================
PLAY DASH
====================================================== */

function playDash(url){

    destroyPlayer();

    showLoading();

    ui.video.style.display="block";

    dashPlayer=dashjs.MediaPlayer().create();

    dashPlayer.initialize(

        ui.video,

        url,

        true

    );

    ui.video.onloadeddata=function(){

        hideLoading();

    };

    ui.video.onerror=function(){

        hideLoading();

        showError();

    };

}


/* ======================================================
PLAY STREAM
====================================================== */

function playStream(ch){

    const type=detectType(ch.stream);

    switch(type){

        case "iframe":

            playIframe(ch.stream);

            break;

        case "hls":

            playHLS(ch.stream);

            break;

        case "dash":

            playDash(ch.stream);

            break;

        case "mp4":

            playMP4(ch.stream);

            break;

        default:

            showError("Format stream tidak dikenali");

    }

}

/* ======================================================
COUNTDOWN ENGINE
====================================================== */

function openChannel(index){

    currentChannel=CHANNELS[index];

    const match=parseMatch(currentChannel.match);

    ui.menu.style.display="none";

    ui.playerPage.style.display="block";

    ui.match.innerHTML=

        flag(match.home)

        +" 🆚 "

        +flag(match.away);

    startCountdown(currentChannel);

}

function startCountdown(ch){

    clearInterval(timerInterval);

    destroyPlayer();

    const start=new Date(ch.kickoff);

    // Mulai memutar stream 15 menit sebelum kickoff
    const playTime=new Date(
        start.getTime()-15*60000
    );

    const end=new Date(
        start.getTime()
        +(ch.duration*60000)
    );

    ui.kickoff.innerHTML=

        "Kickoff "

        +formatTanggal(start).replace("📅 ","")

        +" • "

        +formatJam(start)

        +" "

        +getZona();

    function update(){

        const now=new Date();

        /* ======================
           BELUM MULAI
        ====================== */

        if(now<playTime){

            ui.countdown.style.display="flex";

            ui.status.innerHTML=

                "⏳ Siaran akan dimulai dalam";

            const diff=playTime-now;

            const h=Math.floor(diff/3600000);

            const m=Math.floor((diff%3600000)/60000);

            const s=Math.floor((diff%60000)/1000);

            ui.timer.innerHTML=

                String(h).padStart(2,"0")

                +":"

                +String(m).padStart(2,"0")

                +":"

                +String(s).padStart(2,"0");

            return;

        }

        /* ======================
           SEDANG BERLANGSUNG
        ====================== */

        if(now>=playTime && now<=end){

            ui.countdown.style.display="none";

            if(

                ui.iframe.style.display==="none"

                &&

                ui.video.style.display==="none"

            ){

                playStream(ch);

            }

            return;

        }

        /* ======================
           SELESAI
        ====================== */

        destroyPlayer();

        ui.countdown.style.display="flex";

        ui.status.innerHTML=

            "✅ Siaran telah selesai";

        ui.timer.innerHTML="00:00:00";

    }

    update();

    timerInterval=setInterval(update,1000);

}


/* ======================================================
BACK BUTTON
====================================================== */

function closeChannel(){

    clearInterval(timerInterval);

    destroyPlayer();

    ui.playerPage.style.display="none";

    ui.menu.style.display="block";

}

ui.back.onclick=closeChannel;


/* ======================================================
INITIALIZE
====================================================== */

renderMenu();

window.addEventListener(

    "beforeunload",

    function(){

        clearInterval(timerInterval);

        destroyPlayer();

    }

);

</script>

</body>

</html>
